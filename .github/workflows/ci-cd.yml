name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install worker dependencies
      run: cd apps/worker && npm ci
    
    - name: Install web dependencies
      run: cd apps/web && npm ci
    
    - name: Run linter checks
      run: npm run lint 2>/dev/null || echo "Linting skipped (no lint script configured)"
    
    - name: Run all tests
      run: npm run test:all
    
    - name: Build worker
      run: cd apps/worker && npm run build
    
    - name: Build web
      run: cd apps/web && npm run build

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run npm audit
      run: npm audit --production --audit-level=moderate || npm audit --production --audit-level=moderate; exit 0
    
    - name: Check for security vulnerabilities in worker
      run: cd apps/worker && npm audit --production || npm audit --production; exit 0
    
    - name: Check for security vulnerabilities in web
      run: cd apps/web && npm audit --production || npm audit --production; exit 0

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci && cd apps/worker && npm ci && cd ../web && npm ci
    
    - name: Check for console logs (warning only)
      run: |
        echo "Searching for console statements (warning only - not blocking)..."
        grep -r "console\." apps/worker/src apps/web/src --include="*.ts" --include="*.tsx" | grep -v "node_modules" | wc -l || true
