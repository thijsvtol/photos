name: Android - Build and Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version_bump:
        description: 'Bump version code'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: subdomains/photos/apps/web
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for release notes
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Bump version code
        if: ${{ github.event.inputs.version_bump == 'true' }}
        run: |
          cd android/app
          CURRENT_VERSION_CODE=$(grep "versionCode" build.gradle | awk '{print $2}')
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
          echo "Bumping version from $CURRENT_VERSION_CODE to $NEW_VERSION_CODE"
          sed -i "s/versionCode $CURRENT_VERSION_CODE/versionCode $NEW_VERSION_CODE/" build.gradle
          
          CURRENT_VERSION_NAME=$(grep "versionName" build.gradle | awk '{print $2}' | tr -d '"')
          echo "VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$CURRENT_VERSION_NAME" >> $GITHUB_ENV
      
      - name: Commit version bump
        if: ${{ github.event.inputs.version_bump == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle
          git commit -m "chore(android): bump version to ${{ env.VERSION_CODE }}"
          git push
      
      - name: Get current version
        if: ${{ github.event.inputs.version_bump == 'false' }}
        run: |
          cd android/app
          VERSION_CODE=$(grep "versionCode" build.gradle | awk '{print $2}')
          VERSION_NAME=$(grep "versionName" build.gradle | awk '{print $2}' | tr -d '"')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
      
      - name: Generate release notes
        run: |
          mkdir -p release-notes
          echo "Version ${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }})" > release-notes/en-US.txt
          echo "" >> release-notes/en-US.txt
          echo "Recent changes:" >> release-notes/en-US.txt
          git log -10 --pretty=format:"• %s" --no-merges >> release-notes/en-US.txt
          
          # Truncate to 500 chars (Play Store limit)
          head -c 500 release-notes/en-US.txt > release-notes/en-US-truncated.txt
          mv release-notes/en-US-truncated.txt release-notes/en-US.txt
          
          echo "Release notes:"
          cat release-notes/en-US.txt
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build web app
        run: npx vite build
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release-key.keystore
        working-directory: subdomains/photos/apps/web/android/app
      
      - name: Build Android App Bundle (AAB)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/subdomains/photos/apps/web/android/app/release-key.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/subdomains/photos/apps/web/android/app/release-key.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      
      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: nl.thijsvtol.photos
          releaseFiles: subdomains/photos/apps/web/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: 'draft' # Set to 'completed' after app is live.
          inAppUpdatePriority: 2
          whatsNewDirectory: subdomains/photos/apps/web/release-notes
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v${{ env.VERSION_CODE }}
          path: subdomains/photos/apps/web/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-v${{ env.VERSION_CODE }}
          path: subdomains/photos/apps/web/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create GitHub Release
        if: ${{ github.event.inputs.track == 'production' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-v${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          name: Android v${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }})
          body_path: subdomains/photos/apps/web/release-notes/en-US.txt
          files: |
            subdomains/photos/apps/web/android/app/build/outputs/apk/release/app-release.apk
            subdomains/photos/apps/web/android/app/build/outputs/bundle/release/app-release.aab
      
      - name: Clean up keystore
        if: always()
        run: rm -f release-key.keystore
        working-directory: subdomains/photos/apps/web/android/app
      
      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Android deployed to **${{ github.event.inputs.track }}** track" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }})" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** ${{ github.event.inputs.track }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Draft (requires manual publishing in Play Console)" >> $GITHUB_STEP_SUMMARY
