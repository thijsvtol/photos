name: Security - Staging Access Probe

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

jobs:
  staging-security-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging-security

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install worker dependencies
        working-directory: apps/worker
        run: npm ci

      - name: Run staging access probe
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STAGING_PRIVATE_MEDIA_URL: ${{ secrets.STAGING_PRIVATE_MEDIA_URL }}
          STAGING_COLLAB_MEDIA_URL: ${{ secrets.STAGING_COLLAB_MEDIA_URL }}
          STAGING_ADMIN_BEARER_TOKEN: ${{ secrets.STAGING_ADMIN_BEARER_TOKEN }}
          STAGING_COLLAB_BEARER_TOKEN: ${{ secrets.STAGING_COLLAB_BEARER_TOKEN }}
          STAGING_PRIVATE_ZIP_URL: ${{ secrets.STAGING_PRIVATE_ZIP_URL }}
          STAGING_PRIVATE_ZIP_BODY: ${{ secrets.STAGING_PRIVATE_ZIP_BODY }}
        run: |
          chmod +x scripts/security-staging-probe.sh
          scripts/security-staging-probe.sh

      - name: Run staging integration tests
        working-directory: apps/worker
        env:
          STAGING_BASE_URL: https://staging-photos.thijsvtol.nl
          STAGING_PRIVATE_MEDIA_URL: ${{ secrets.STAGING_PRIVATE_MEDIA_URL }}
          STAGING_COLLAB_MEDIA_URL: ${{ secrets.STAGING_COLLAB_MEDIA_URL }}
          STAGING_ADMIN_BEARER_TOKEN: ${{ secrets.STAGING_ADMIN_BEARER_TOKEN }}
          STAGING_COLLAB_BEARER_TOKEN: ${{ secrets.STAGING_COLLAB_BEARER_TOKEN }}
          STAGING_PRIVATE_ZIP_URL: ${{ secrets.STAGING_PRIVATE_ZIP_URL }}
          STAGING_PRIVATE_ZIP_BODY: ${{ secrets.STAGING_PRIVATE_ZIP_BODY }}
        run: npm run test:integration:staging:full
