// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.1.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects { project ->
    if (project.name == 'capawesome-capacitor-file-picker') {
        tasks.withType(JavaCompile).configureEach {
            options.compilerArgs += ['-Xlint:-deprecation']
        }
    }

    if (project.name == 'capacitor-filesystem') {
        tasks.matching { it.name.toLowerCase().contains('compile') && it.name.toLowerCase().contains('kotlin') }.configureEach {
            if (it.hasProperty('kotlinOptions')) {
                it.kotlinOptions.suppressWarnings = true
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
