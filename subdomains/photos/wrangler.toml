name = "photos-worker"
main = "./apps/worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "photos-db"
database_id = "45a56052-5385-463d-bc79-7ddc20307f53"

# R2 Storage binding
[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "photos-storage"

# Environment variables and secrets
# Set these via: wrangler secret put <NAME>
[vars]
ENVIRONMENT = "development"
ADMIN_EMAILS = "vantol.thijs@gmail.com" # Replace with your admin email(s), comma-separated for multiple

# Secrets (set via wrangler secret put):
# - EVENT_COOKIE_SECRET: Secret for signing event session cookies
# - ADMIN_EMAILS: Comma-separated list of admin email addresses (use vars instead for easier updates)

# Development configuration
[env.development]
name = "photos-worker-dev"

# Production configuration
[env.production]
name = "photos-worker"
routes = [
  { pattern = "photos.thijsvtol.nl/api/*", zone_name = "thijsvtol.nl" },
  { pattern = "photos.thijsvtol.nl/media/*", zone_name = "thijsvtol.nl" },
  { pattern = "photos.thijsvtol.nl/sitemap.xml", zone_name = "thijsvtol.nl" },
  { pattern = "photos.thijsvtol.nl/robots.txt", zone_name = "thijsvtol.nl" }
]

[env.production.vars]
ENVIRONMENT = "production"
ADMIN_EMAILS = "vantol.thijs@gmail.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "photos-db"
database_id = "45a56052-5385-463d-bc79-7ddc20307f53"

[[env.production.r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "photos-storage"
