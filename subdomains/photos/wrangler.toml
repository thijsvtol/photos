name = "photos-worker"
main = "./apps/worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "photos-db"
database_id = "45a56052-5385-463d-bc79-7ddc20307f53" # Replace with your database_id

# R2 Storage binding
[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "photos-storage"

# Environment variables and secrets
# Set these via: wrangler secret put <NAME>
[vars]
ENVIRONMENT = "development"
APP_NAME = "Photos"
BRAND_NAME = "Photos"
COPYRIGHT_HOLDER = "Your Name"
APP_DOMAIN = "localhost:8787"
CONTACT_EMAIL = "contact@example.com"

# Secrets (set via wrangler secret put):
# - EVENT_COOKIE_SECRET: Secret for signing event session cookies
# - JWT_SECRET: Secret for signing mobile app JWT tokens  
# - ADMIN_EMAILS: Comma-separated list of admin email addresses
# - GA_MEASUREMENT_ID: (Optional) Google Analytics 4 Measurement ID (format: G-XXXXXXXXXX)
# - MAILGUN_API_KEY: (Optional) Mailgun API key for email notifications
# - MAILGUN_DOMAIN: (Optional) Mailgun domain for sending emails

# Development configuration
[env.development]
name = "photos-worker-dev"

# Production configuration
# Update routes to match your domain
[env.production]
name = "photos-worker"
# IMPORTANT: Update these routes to match your APP_DOMAIN
# Example: { pattern = "photos.yourdomain.com/api/*", zone_name = "yourdomain.com" }
routes = [
  { pattern = "photos.thijsvtol.nl/api/*", zone_name = "thijsvtol.nl" },
  { pattern = "photos.thijsvtol.nl/media/*", zone_name = "thijsvtol.nl" },
  { pattern = "photos.thijsvtol.nl/sitemap.xml", zone_name = "thijsvtol.nl" },
  { pattern = "photos.thijsvtol.nl/robots.txt", zone_name = "thijsvtol.nl" }
]

[env.production.vars]
ENVIRONMENT = "production"
APP_NAME = "Thijs van Tol Photos"
BRAND_NAME = "Thijs van Tol"
COPYRIGHT_HOLDER = "Thijs van Tol"
APP_DOMAIN = "photos.thijsvtol.nl"
CONTACT_EMAIL = "info@thijsvtol.nl"

[[env.production.d1_databases]]
binding = "DB"
database_name = "photos-db"
database_id = "45a56052-5385-463d-bc79-7ddc20307f53"

[[env.production.r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "photos-storage"
